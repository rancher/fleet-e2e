name: Prettier Check

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - 'tests/**/*.ts'
      - 'tests/**/*.js'
      - 'tests/**/*.json'
      - 'tests/**/*.yml'
      - 'tests/**/*.yaml'
      - 'tests/**/*.md'
      - 'tests/package.json'
      - 'tests/.prettierrc.json'
      - 'tests/.prettierignore'
      - '.github/workflows/prettier.yaml'

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: current

      - name: Install dependencies
        working-directory: tests
        run: npm install

      - name: Run ESLint
        working-directory: tests
        run: npm run lint

      - name: Run Prettier
        working-directory: tests
        run: npm run prettier
